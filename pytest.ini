[pytest]
# Pytest configuration for RAG Application

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests
    performance: Performance tests
    slow: Slow tests
    requires_db: Tests that require database
    requires_redis: Tests that require Redis
    requires_llm: Tests that require LLM
    smoke: Smoke tests
    regression: Regression tests

# Output options
addopts =
    --strict-markers
    --tb=short
    --disable-warnings
    -ra
    --maxfail=5
    --ff
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-branch
    --cov-fail-under=70
    -v

# Coverage configuration
[coverage:run]
branch = True
omit =
    */tests/*
    */test_*.py
    setup.py
    */migrations/*
    */__pycache__/*
    */venv/*
    */virtualenv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
    except ImportError:
    except ModuleNotFoundError:
    @pytest.skip
    @pytest.mark.skip
    def __str__
    def __hash__

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml

# Asyncio configuration
asyncio_mode = auto

# Timeout configuration (if using pytest-timeout)
timeout = 300

# Logging configuration (if using pytest-logging)
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_file = tests/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(filename)s:%(lineno)d - %(message)s
