services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ragapp-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-ragapp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeMe123}
      POSTGRES_DB: ${DB_NAME:-ragapp_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ragapp_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ragapp-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ragapp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes
    networks:
      - ragapp-network

  # Main RAG Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ragapp-api
    environment:
      - APP_ENV=${APP_ENV:-development}
      - APP_DEBUG=${APP_DEBUG:-false}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-ragapp_user}
      - DB_PASSWORD=${DB_PASSWORD:-changeMe123}
      - DB_NAME=${DB_NAME:-ragapp_db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your_super_secret_key_change_this}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    volumes:
      - ./knowledge_base:/app/knowledge_base
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ragapp-network
    restart: unless-stopped

  # Prometheus Metrics (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: ragapp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - app
    networks:
      - ragapp-network
    profiles:
      - monitoring
    restart: unless-stopped

  # Grafana Dashboards (Optional)
  grafana:
    image: grafana/grafana:latest
    container_name: ragapp-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - ragapp-network
    profiles:
      - monitoring

  # Elasticsearch for Logging (Optional)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.0.0
    container_name: ragapp-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - ragapp-network
    profiles:
      - logging

  # Kibana for Log Visualization (Optional)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.0.0
    container_name: ragapp-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - ragapp-network
    profiles:
      - logging

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:

networks:
  ragapp-network:
    driver: bridge

# Usage Instructions:
# 
# Development (basic stack):
#   docker-compose up -d
#
# With monitoring stack:
#   docker-compose --profile monitoring up -d
#
# With logging stack:
#   docker-compose --profile logging up -d
#
# With all optional services:
#   docker-compose --profile monitoring --profile logging up -d
#
# View logs:
#   docker-compose logs -f app
#
# Stop services:
#   docker-compose down
#
# Clean up volumes (WARNING: deletes data):
#   docker-compose down -v
