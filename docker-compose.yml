version: '3.8'

services:
  # FastAPI Application
  app:
    build: .
    container_name: rag-app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - ENVIRONMENT=production
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DATABASE_URL=sqlite:////app/data/rag_dev.db
      - FAISS_INDEX_PATH=/app/data/vector_index/faiss.index
      - FAISS_METADATA_PATH=/app/data/vector_index/faiss_metadata.pkl
      - UPLOAD_DIR=/app/data/uploads/
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    depends_on:
      - redis
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis for caching & sessions
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend (if using separate container)
  frontend:
    image: node:18-alpine
    container_name: rag-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    command: npm start
    depends_on:
      - app
    networks:
      - rag-network

volumes:
  redis-data:

networks:
  rag-network:
    driver: bridge
